; https://docs.platformio.org/page/projectconf.html

[env:esp32-poe-iso]
platform = espressif32
board = esp32-poe-iso
framework = arduino
monitor_speed = 115200
board_build.embed_txtfiles =
	data/tally.html
	data/index.html
	data/director.html
lib_deps = 
	khoih-prog/WebServer_WT32_ETH01@^1.5.1
	bblanchon/ArduinoJson@^6.21.3
	Links2004/WebSockets@^2.3.7

[env:wt32-eth01]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200
board_build.embed_txtfiles =
	data/tally.html
	data/index.html
	data/director.html
lib_deps = 
	khoih-prog/WebServer_WT32_ETH01@^1.5.1
	bblanchon/ArduinoJson@^6.21.3
	Links2004/WebSockets@^2.3.7

